# Single source of truth for configure-plugin's skill taxonomy.
#
# Consumers:
#   - configure-all      — iterates `components` to run every check (via scripts/list-components.sh)
#   - configure-select   — builds its AskUserQuestion domain menus from this file
#   - configure-status   — rolls up detection-script results for has_script components
#   - docs/flow.md       — the Domain → Skill mapping table must match this file
#   - README.md          — every skill listed here must appear in the README
#
# Drift guard: scripts/check-configure-components.sh (repo root) fails CI when
# this file, the skills on disk, configure-all/SKILL.md, docs/flow.md, or
# README.md disagree. Add new skills HERE first; the guard tells you what else
# to update.
#
# Schema (kept flat and awk-parseable — no yq dependency):
#   domains:        domain-key: Human Title
#   components:     - name / domain / has_script / types
#     types: "all" or a comma-separated subset of frontend,infrastructure,python,rust
#     has_script: true when skills/<name>/scripts/<name>.sh exists (detection-only script)
#   orchestrators:  driver skills that are not components themselves
#   advisory:       guidance-only skills (no check+fix contract)
#   reference_skills: user-invocable: false knowledge bases loaded by other skills

version: 1

domains:
  ci-cd: CI/CD & Version Control
  git-metadata: Git Metadata
  containers-deploy: Containers & Deploy
  testing: Testing
  code-quality: Code Quality
  security: Security
  docs: Documentation
  feature-flags: Feature Flags
  package-management: Package Management
  dev-environment: Editor & Dev Environment
  instrumentation-observability: Instrumentation & Observability

