name: "Plugin: PR checks"

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '*-plugin/**'
      - '.claude-plugin/marketplace.json'
      - '**/skills/**'
      # Workflow changes must trigger the agent-model and workflow-model guards
      # (both run unconditionally below) — workflow model/effort drift lives here.
      - '.github/workflows/**'

concurrency:
  group: plugin-pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  compliance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get changed plugin files
        id: changed
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*-plugin/**' '.claude-plugin/marketplace.json' '**/skills/**' | head -50)
          {
            echo "files<<EOF"
            echo "$FILES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          # Extract unique plugin directories affected.
          # Emit as a single space-separated line so downstream steps can
          # interpolate the value without bash splitting it across multiple
          # commands (see issue #1385).
          PLUGINS=$(echo "$FILES" | grep -oP '^[a-z][^/]*-plugin' | sort -u | tr '\n' ' ')
          PLUGINS=${PLUGINS% }
          PLUGIN_COUNT=$(echo "$PLUGINS" | wc -w | tr -d ' ')
          echo "plugins=$PLUGINS" >> "$GITHUB_OUTPUT"
          echo "plugin_count=$PLUGIN_COUNT" >> "$GITHUB_OUTPUT"

          # Check if skill files changed
          SKILL_FILES=$(echo "$FILES" | grep -c 'skills/' || true)
          echo "skill_count=$SKILL_FILES" >> "$GITHUB_OUTPUT"

          # Detect whether this PR modifies this workflow file itself.
          # When it does, claude-code-action's OIDC token exchange is
          # blocked by GitHub (the workflow must match the default branch
          # to prevent privilege escalation), so the Claude Skill Quality
          # Review step is skipped to avoid a benign-but-red failure
          # (see issues #1472, #1495, #1508).
          if git diff --name-only "origin/${{ github.base_ref }}...HEAD" \
            -- .github/workflows/plugin-pr-checks.yml | grep -q .; then
            echo "workflow_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "workflow_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run plugin compliance checks
        id: compliance
        if: steps.changed.outputs.plugin_count != '0'
        env:
          PLUGINS: ${{ steps.changed.outputs.plugins }}
        run: |
          # Pass plugins via env var (not template interpolation) so a
          # multi-plugin value cannot break the shell command. Word-split
          # is intentional: the script takes plugin names as separate args.
          # shellcheck disable=SC2086
          RESULT=$(bash scripts/plugin-compliance-check.sh $PLUGINS) || true
          {
            echo "result<<COMPLIANCE_EOF"
            echo "$RESULT"
            echo "COMPLIANCE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Check blueprint-upgrade target version drift
        if: contains(steps.changed.outputs.plugins, 'blueprint-plugin')
        run: bash scripts/check-blueprint-upgrade-target.sh

      - name: Check agent dispatch loud-failure contract (#1422)
        if: contains(steps.changed.outputs.plugins, 'agent-patterns-plugin')
        run: bash scripts/check-agent-failure-contract.sh

      - name: Self-test the agent-model guard
        # Whole-repo invariant (every plugin agent must run on opus). Runs
        # unconditionally like the docs-index check below — the lint is cheap
        # and the self-test proves the guard before it gates the tree.
        run: bash scripts/tests/test-check-agent-model.sh

      - name: Check every plugin agent runs on opus
        run: bash scripts/check-agent-model.sh

      - name: Self-test the workflow-model guard
        # Whole-repo invariant (every Claude workflow must pin opus + explicit
        # effort). Runs unconditionally like the agent-model pair above — the
        # self-test proves the guard before it gates the tree.
        run: bash scripts/tests/test-check-workflow-model.sh

      - name: Check every Claude workflow pins opus + effort
        run: bash scripts/check-workflow-model.sh

      - name: Self-test the shell-script lint guard
        # Whole-repo invariant (every shell script follows shell-scripting.md:
        # #!/usr/bin/env bash shebang, set flags, block()). Runs unconditionally
        # like the agent/workflow-model pairs above — the self-test proves the
        # guard before it gates the tree.
        run: bash scripts/tests/test-lint-shell-scripts.sh

      - name: Check shell scripts follow shell-scripting.md
        run: bash scripts/lint-shell-scripts.sh

      - name: Install actionlint
        # GitHub Actions YAML schema/best-practice lint — the one workflow gate
        # check-workflow-model.sh does not cover. ubuntu-latest ships Go and
        # adds $HOME/go/bin to PATH.
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: Lint workflows with actionlint
        # Two documented, tracked suppressions keep this a green blocking gate
        # that still catches NEW issues (the point of the gate):
        #   -shellcheck=  : disable embedded run-block shellcheck. 58 pre-existing
        #                   info/style findings (SC2086/SC2129) exist; cleaning
        #                   them and re-enabling is a follow-up (see #1775).
        #   -ignore result: the scheduled-audits / workflow-model-audit "Create
        #                   issue" steps read steps.<id>.outputs.result from a
        #                   claude-code-action step that has no such output — a real
        #                   latent bug fixed separately (see #1774).
        run: actionlint -color -shellcheck= -ignore 'property "result" is not defined'

      - name: Check version-pin coverage (version-pinning.md)
        if: steps.changed.outputs.skill_count != '0'
        run: bash scripts/check-version-pin-coverage.sh --strict

      - name: Check docs-index drift (README/PLUGIN-MAP/diagram counts)
        # Whole-repo invariant. The workflow path filter already scopes this to
        # PRs that add/remove plugins or skills — exactly what drifts the
        # per-plugin counts in README.md, docs/PLUGIN-MAP.md, and the d2
        # diagram. Refresh on demand with the /docs-refresh project skill.
        run: bash scripts/check-docs-index.sh --strict

      - name: Post compliance results
        if: steps.compliance.outputs.result
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          # Pass the multi-line comment body via env var so markdown
          # special characters (backticks, quotes, parentheses) cannot
          # corrupt the shell command and pollute the gh API call
          # (see issue #1385: PR #1384 hit HTTP 401 on this step).
          COMMENT_BODY: ${{ steps.compliance.outputs.result }}
        run: |
          gh pr comment "$PR_NUMBER" --body "$COMMENT_BODY"

      - name: Claude Skill Quality Review
        # Skip when this PR modifies plugin-pr-checks.yml: GitHub blocks the
        # OIDC token exchange claude-code-action needs whenever the running
        # workflow differs from the default branch (issues #1472, #1495, #1508).
        if: steps.changed.outputs.skill_count != '0' && steps.changed.outputs.workflow_changed != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "claude[bot],claude"
          claude_args: "--model opus --effort low --max-turns 25"
          prompt: |
            Review the changed skill files in this PR for quality compliance.
            Read the rules at .claude/rules/skill-quality.md for the full checklist.

            Changed files:
            ${{ steps.changed.outputs.files }}

            For each changed SKILL.md file, check:

            1. **"When to Use" table**: Does it have a decision table helping Claude choose this skill?
            2. **Agentic Optimizations**: Does it have a compact commands table? (required for CLI/tool skills)
            3. **Description quality**: Does the description match user intents, not just tool jargon?
            4. **Model selection**: Default is `opus` with `effort` as the cost lever; flag any `model: haiku` (banned) or unjustified `model: sonnet`. See `.claude/rules/skill-development.md`.
            5. **Supporting file links**: If REFERENCE.md exists, is it linked with `[REFERENCE.md](REFERENCE.md)`?

            For each issue found, leave a specific, actionable review comment on the relevant file.
            If all checks pass, leave a brief approval comment.

            Do NOT suggest changes unrelated to skill quality (no code style, no typo fixes).
            Focus ONLY on the quality checklist above.
