name: "Plugin: Lint skills"

on:
  pull_request:
    paths:
      - '**/skills/**/SKILL.md'
      - '**/skills/**/skill.md'
      - '**/skills/**/REFERENCE.md'
      - 'taskwarrior-plugin/**/*.md'
      - 'scripts/lint-context-commands.sh'
      - 'scripts/check-context-command-execution.sh'
      - 'scripts/lib/extract-md-elements.py'
      - 'scripts/audit-skill-descriptions.py'
      - 'scripts/lint-taskwarrior-tags.sh'
      - 'scripts/lint-package-references.sh'
  push:
    branches:
      - main
    paths:
      - '**/skills/**/SKILL.md'
      - '**/skills/**/skill.md'
      - '**/skills/**/REFERENCE.md'
      - 'taskwarrior-plugin/**/*.md'
      - 'scripts/lint-context-commands.sh'
      - 'scripts/check-context-command-execution.sh'
      - 'scripts/lib/extract-md-elements.py'
      - 'scripts/audit-skill-descriptions.py'
      - 'scripts/lint-taskwarrior-tags.sh'
      - 'scripts/lint-package-references.sh'

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        # check-context-command-execution.sh extracts Context commands via
        # scripts/lib/extract-md-elements.py, a self-contained `uv run` PEP723
        # script (tree-sitter + tree-sitter-markdown).
        uses: astral-sh/setup-uv@v6

      - name: Lint context commands
        run: ./scripts/lint-context-commands.sh

      - name: Execute context commands in a bare sandbox (must not abort)
        # Semantic backstop to the regex lint above: actually runs every
        # published skill's `## Context` backtick command in a one-commit
        # sandbox and fails if any writes to stderr or exits non-zero (the
        # skill-abort class). See scripts/check-context-command-execution.sh.
        run: ./scripts/check-context-command-execution.sh --strict

      - name: Install Python deps for skill-description audit
        run: pip install --quiet pyyaml

      - name: Audit skill descriptions for auto-invocation
        run: python3 scripts/audit-skill-descriptions.py --strict-all

      - name: Audit skill descriptions for listing-budget verbosity
        # Fails only on the >300 char ERROR band. The 201-300 char WARN band
        # surfaces via plugin-compliance-check.sh recommendations.
        # See .claude/rules/skill-quality.md "Description Length and the Listing Budget".
        run: python3 scripts/audit-skill-descriptions.py --strict-length

      - name: Lint taskwarrior-plugin docs for hyphenated tag names
        run: ./scripts/lint-taskwarrior-tags.sh

      - name: Lint skill files for nonexistent package references (npm/PyPI/crates/etc.)
        run: ./scripts/lint-package-references.sh
