name: "Test: Skill scripts"

# Runs the skill-local regression tests that ship next to a skill's extracted
# scripts (**/skills/**/scripts/tests/test-*.sh) AND the plugin hook regression
# suites (*/hooks/test-*.sh — bash-antipatterns, branch-protection, …), matching
# what scripts/run-skill-script-tests.sh discovers. Mirrors the per-path-trigger
# shape of plugin-enablement-drift.yml so it fires only when skill scripts, hook
# scripts, or the runner itself change — independent of plugin-pr-checks.yml,
# which gates the SKILL.md / compliance surface.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**/skills/**/scripts/**'
      - '*-plugin/hooks/**'
      - 'scripts/run-skill-script-tests.sh'
      - 'scripts/configure-opencode.sh'
      - 'scripts/install-opencode-ocx.sh'
      - 'scripts/install-opencode.sh'
      - 'scripts/export-opencode.sh'
      - 'scripts/rewrite-skill-name-to-dir.py'
      - 'scripts/generate-opencode-hook-plugins.py'
      - 'scripts/tests/test-configure-opencode.sh'
      - 'scripts/tests/test-rewrite-skill-name-to-dir.sh'
      - 'scripts/tests/test-export-opencode-hooks.sh'
      - '*-plugin/hooks.json'
      - 'justfile'
      - '.github/workflows/test-skill-scripts.yml'
  push:
    branches: [main]
    paths:
      - '**/skills/**/scripts/**'
      - '*-plugin/hooks/**'
      - 'scripts/run-skill-script-tests.sh'
      - 'scripts/configure-opencode.sh'

concurrency:
  group: test-skill-scripts-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # ast-grep powers the code-antipatterns / code-hidden-failures rule-project
      # regression tests (issue #2010). Absent, those tests SKIP; installed, the
      # `ast-grep test` fixture gate actually runs in CI. Pinned to match the
      # version the fixtures were authored against.
      - name: Install ast-grep
        run: npm install -g @ast-grep/cli@0.43.0

      - name: Run skill-local regression tests
        run: bash scripts/run-skill-script-tests.sh

      - name: Smoke-test the OpenCode config generator
        run: bash scripts/tests/test-configure-opencode.sh

      - name: Regression-test the OpenCode skill-name rewrite
        run: bash scripts/tests/test-rewrite-skill-name-to-dir.sh

      - name: Regression-test the OpenCode hook-plugin export
        run: bash scripts/tests/test-export-opencode-hooks.sh
