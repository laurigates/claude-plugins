# Condition matrix: cartesian product of (model/thinking) x (system_prompt).
#
# `thinking` maps to `claude --effort <level>` (low|medium|high|xhigh|max).
# `system_prompt: default` = no override (baseline Claude Code).
# `system_prompt: probe`   = --system-prompt "$(cat prompts/probe.md)".

conditions:
  - id: opus-xhigh-default
    model: claude-opus-4-7
    thinking: xhigh
    system_prompt: default

  - id: opus-xhigh-probe
    model: claude-opus-4-7
    thinking: xhigh
    system_prompt: probe

  - id: opus-medium-default
    model: claude-opus-4-7
    thinking: medium
    system_prompt: default

  - id: opus-medium-probe
    model: claude-opus-4-7
    thinking: medium
    system_prompt: probe
