# Condition matrix: cartesian product of (effort) x (system_prompt).
#
# `effort` maps to `claude --effort <level>` (low|medium|high|xhigh|max).
# `system_prompt: default` = no override (baseline Claude Code).
# `system_prompt: probe`   = --system-prompt "$(cat prompts/probe.md)".
#
# Model is fixed to claude-opus-4-8 — Opus 4.8 on *low* effort beats Sonnet
# on both cost and quality (see ~/.claude/rules/agent-and-tool-selection.md),
# so the cost lever is now *effort*, not model tier.
#
# Efforts under automated test: low, medium, high, xhigh (4 × 2 prompts = 8).
# `max` is opt-in only — add an `opus-max-*` pair manually / via `just run-max`
# for the occasional heavy check; it is never in the default sweep. (`ultracode`
# is a workflow opt-in, not an `--effort` level, so it is out of scope here.)
#
# IDs keep the `opus-` prefix so a one-off `max` or comparison condition can be
# added later without collision.

conditions:
  - id: opus-low-default
    model: claude-opus-4-8
    thinking: low
    system_prompt: default

  - id: opus-low-probe
    model: claude-opus-4-8
    thinking: low
    system_prompt: probe

  - id: opus-medium-default
    model: claude-opus-4-8
    thinking: medium
    system_prompt: default

  - id: opus-medium-probe
    model: claude-opus-4-8
    thinking: medium
    system_prompt: probe

  - id: opus-high-default
    model: claude-opus-4-8
    thinking: high
    system_prompt: default

  - id: opus-high-probe
    model: claude-opus-4-8
    thinking: high
    system_prompt: probe

  - id: opus-xhigh-default
    model: claude-opus-4-8
    thinking: xhigh
    system_prompt: default

  - id: opus-xhigh-probe
    model: claude-opus-4-8
    thinking: xhigh
    system_prompt: probe

  # --- config-isolation arms (Phase 0) -----------------------------------
  # A separate axis from the system_prompt A/B above: hold model + effort +
  # system_prompt fixed and vary ONLY which config surface Claude Code loads.
  #   clean        = system prompt only            (claude --bare)
  #   plugins-only = marketplace skills, NO global ~/.claude memory (cloud/CI parity)
  #   full         = real ~/.claude: 75k rules + CLAUDE.md + skills + hooks
  # The isolated arms lose the OAuth login, so they need CLAUDE_CODE_OAUTH_TOKEN
  # in the environment — run them via `just run-config` (which sources it and
  # preps the plugins-only config dir). Run `claude setup-token` once to mint it.
  - id: cfg-clean
    model: claude-opus-4-8
    thinking: low
    system_prompt: default
    config: clean

  - id: cfg-plugins
    model: claude-opus-4-8
    thinking: low
    system_prompt: default
    config: plugins-only

  - id: cfg-full
    model: claude-opus-4-8
    thinking: low
    system_prompt: default
    config: full
