repos:
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
  - repo: local
    hooks:
      - id: lint-context-commands
        name: lint context commands
        entry: ./scripts/lint-context-commands.sh
        language: script
        files: '(SKILL|skill)\.md$'
        pass_filenames: false
      - id: check-context-command-execution
        name: execute context commands in a bare sandbox (must not abort)
        entry: ./scripts/check-context-command-execution.sh --strict
        language: script
        files: '(SKILL|skill)\.md$'
        exclude: '^\.claude/'
        pass_filenames: true
      - id: check-driver-freshness
        name: check configure-repo driver freshness
        entry: bash ./scripts/check-driver-freshness.sh
        language: system
        files: '(SKILL|skill)\.md$'
        pass_filenames: false
      - id: audit-skill-descriptions
        name: audit skill descriptions for auto-invocation
        entry: python3 ./scripts/audit-skill-descriptions.py --strict-all
        language: system
        files: '(SKILL|skill)\.md$'
        pass_filenames: false
      - id: audit-skill-description-length
        name: audit skill descriptions for listing-budget verbosity (>300 chars)
        entry: python3 ./scripts/audit-skill-descriptions.py --strict-length
        language: system
        files: '(SKILL|skill)\.md$'
        pass_filenames: false
      - id: lint-taskwarrior-tags
        name: lint taskwarrior-plugin docs for hyphenated tag names
        entry: ./scripts/lint-taskwarrior-tags.sh
        language: script
        files: '^taskwarrior-plugin/.*\.md$'
        pass_filenames: false
      - id: check-agent-tool-selection
        name: every plugin agent embeds a Tool Selection section
        entry: ./scripts/check-agent-tool-selection.sh
        language: script
        files: '/agents/.*\.md$'
        pass_filenames: false
      - id: check-agent-model
        name: every plugin agent runs on opus
        entry: ./scripts/check-agent-model.sh
        language: script
        files: '/agents/.*\.md$'
        pass_filenames: false
      - id: check-agent-failure-contract
        name: dispatch skills carry the loud-failure contract (#1422)
        entry: ./scripts/check-agent-failure-contract.sh
        language: script
        files: '^agent-patterns-plugin/skills/(parallel-agent-dispatch|custom-agent-definitions)/SKILL\.md$'
        pass_filenames: false
      - id: check-skill-filename-case
        name: skill files are named SKILL.md (case-sensitive; #1606)
        entry: ./scripts/check-skill-filename-case.sh
        language: script
        files: '(?i)/skills/.*/skill\.md$'
        pass_filenames: false
      - id: lint-mcp-tool-references
        name: lint skill files for references to unavailable MCP tools
        entry: ./scripts/lint-mcp-tool-references.sh
        language: script
        files: '(SKILL\.md|skill\.md|REFERENCE\.md)$'
        pass_filenames: false
      - id: lint-package-references
        name: lint skill files for references to nonexistent packages (npm/PyPI/crates/etc.)
        entry: ./scripts/lint-package-references.sh
        language: script
        files: '(SKILL\.md|skill\.md|REFERENCE\.md)$'
        pass_filenames: false
      - id: check-version-pin-coverage
        name: skill version pins are a Renovate-managed shape (version-pinning.md)
        entry: bash ./scripts/check-version-pin-coverage.sh --strict
        language: system
        files: '/skills/.*\.md$'
        pass_filenames: false
      - id: check-enabled-plugins-drift
        name: enabledPlugins matches the marketplace (plugin-enablement-drift)
        entry: bash ./scripts/check-enabled-plugins-drift.sh --strict
        language: system
        files: '^(\.claude-plugin/marketplace\.json|\.claude/settings\.json)$'
        pass_filenames: false
      - id: test-fetch-research-papers
        name: research-radar fetcher parse/dedup/date-filter regression
        entry: bash ./scripts/tests/test-fetch-research-papers.sh
        language: system
        files: '^scripts/(fetch-research-papers\.sh|tests/test-fetch-research-papers\.sh)$'
        pass_filenames: false
      - id: test-plugin-compliance-skill-size
        name: skill-size gate measures chars/tokens, not lines (skill-line-count-validity)
        entry: bash ./scripts/tests/test-plugin-compliance-skill-size.sh
        language: system
        files: '^scripts/(plugin-compliance-check\.sh|tests/test-plugin-compliance-skill-size\.sh)$'
        pass_filenames: false
      - id: test-plugin-compliance-frontmatter-dupkey
        name: skill frontmatter rejects duplicated mapping keys (export-opencode)
        entry: bash ./scripts/tests/test-plugin-compliance-frontmatter-dupkey.sh
        language: system
        files: '^scripts/(plugin-compliance-check\.sh|tests/test-plugin-compliance-frontmatter-dupkey\.sh)$'
        pass_filenames: false
      - id: test-audit-scripts-exit
        name: scheduled-audits scripts exit 0 under set -euo pipefail (scheduled-audits)
        entry: bash ./scripts/tests/test-audit-scripts-exit.sh
        language: system
        files: '^scripts/(blueprint-health-check\.sh|infra-compliance-check\.sh|tests/test-audit-scripts-exit\.sh)$'
        pass_filenames: false
      - id: test-check-context-command-execution
        name: context-command execution harness regression
        entry: bash ./scripts/tests/test-check-context-command-execution.sh
        language: system
        files: '^scripts/(check-context-command-execution\.sh|tests/test-check-context-command-execution\.sh)$'
        pass_filenames: false
      - id: test-rewrite-skill-name-to-dir
        name: opencode skill-name rewrite regression
        entry: bash ./scripts/tests/test-rewrite-skill-name-to-dir.sh
        language: system
        files: '^scripts/(rewrite-skill-name-to-dir\.py|export-opencode\.sh|install-opencode\.sh|tests/test-rewrite-skill-name-to-dir\.sh)$'
        pass_filenames: false
